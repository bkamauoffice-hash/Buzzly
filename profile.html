<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzly Profile</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.profile-header{
    background:#ff0050;
    padding:25px;
    text-align:center;
}

.profile-pic{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #fff;
    object-fit:cover;
}

.username{
    margin-top:10px;
    font-size:28px;
    font-weight:bold;
}

.handle{
    color:#ddd;
    margin-top:5px;
}

.bio{
    padding:15px;
    text-align:center;
    color:#ccc;
}

.stats{
    display:flex;
    justify-content:space-around;
    text-align:center;
    margin:20px;
}

.stats h2{
    margin:0;
    color:#fff;
}

.stats p{
    margin:4px 0;
    color:#aaa;
}

.edit-btn{
    display:block;
    width:90%;
    margin:auto;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#ff0050;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.posts{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
    padding:10px;
}

.posts img{
    width:100%;
    aspect-ratio:1;
    object-fit:cover;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#000;
    padding:10px 0;
}

.bottom-nav button{
    background:none;
    border:none;
    color:#fff;
    font-size:26px;
}
</style>
</head>

<body>

<div class="profile-header">

<img src="https://i.pravatar.cc/200?img=12" class="profile-pic">

<div class="username">Brian Kaytrix</div>

<div class="handle">@briankaytrix</div>

</div>

<div class="bio">
🚀 Creator • Tech Lover • Welcome to Buzzly
</div>

<div class="stats">

<div>
<h2>24</h2>
<p>Posts</p>
</div>

<div>
<h2>1.2K</h2>
<p>Followers</p>
</div>

<div>
<h2>340</h2>
<p>Following</p>
</div>

</div>

<button class="edit-btn">
Edit Profile
</button>

<div class="posts">

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">
<img src="https://picsum.photos/300?4">
<img src="https://picsum.photos/300?5">
<img src="https://picsum.photos/300?6">
<img src="https://picsum.photos/300?7">
<img src="https://picsum.photos/300?8">
<img src="https://picsum.photos/300?9">

</div>

<div style="height:80px"></div>

<nav class="bottom-nav">

<button onclick="location.href='index.html'">🏠</button>

<button>🎥</button>

<button>➕</button>

<button>🔔</button>

<button onclick="location.href='profile.html'">👤</button>

</nav>

</body>
                           </html>
