<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buzzly</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- Top Bar -->
<header class="top-bar">
    <div class="tabs">
        <span>Following</span>
        <span class="active">For You</span>
    </div>

    <button class="search-btn">
        <i class="fas fa-search"></i>
    </button>
</header>

<!-- Video Feed -->
<main id="feed">

<section class="video-card">

<video autoplay muted loop playsinline>
<source src="assets/videos/demo.mp4" type="video/mp4">
</video>

<div class="overlay">

<div class="video-info">
<h3>@Buzzly</h3>
<p>🚀 Welcome to Buzzly — Share your moments.</p>
<p>🎵 Original Sound</p>
</div>

<div class="actions">

<div class="action">
<img src="https://i.pravatar.cc/80?img=12" class="avatar">
</div>

<div class="action">
<i class="fas fa-heart"></i>
<span>125K</span>
</div>

<div class="action">
<i class="fas fa-comment-dots"></i>
<span>3.2K</span>
</div>

<div class="action">
<i class="fas fa-bookmark"></i>
<span>Save</span>
</div>

<div class="action">
<i class="fas fa-share"></i>
<span>Share</span>
</div>

</div>

</div>

</section>

</main>

<!-- Bottom Navigation -->
<nav class="bottom-nav">

<button onclick="location.href='index.html'">
<i class="fas fa-house"></i>
</button>

<button onclick="location.href='friends.html'">
<i class="fas fa-user-group"></i>
</button>

<button onclick="location.href='create.html'">
<i class="fas fa-circle-plus"></i>
</button>

<button onclick="location.href='inbox.html'">
<i class="fas fa-message"></i>
</button>

<button onclick="location.href='profile.html'">
<i class="fas fa-user"></i>
</button>

</nav>

<script src="js/app.js"></script>

</body>
</html>
